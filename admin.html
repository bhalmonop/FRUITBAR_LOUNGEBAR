<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRUITBAR - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #00470c;
      --green-light: #00a31c;
      --green-dark: #002a06;
      --bg: #0A0A0A;
      --bg2: #111111;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --text: #F0EDE8;
      --text-muted: #8A8680;
      --danger: #ef4444;
      --radius: 12px;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    input, button, select { font-family: inherit; }

    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); padding: 48px 40px;
      width: 100%; max-width: 400px;
    }
    .login-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .login-card h1 em { font-style: normal; color: var(--green-light); }
    .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .login-card label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .login-card input {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: var(--surface);
      color: var(--text); font-size: 15px; outline: none;
      transition: border-color 0.3s; margin-bottom: 20px;
    }
    .login-card input:focus { border-color: var(--green-light); }
    .login-card .btn {
      width: 100%; padding: 14px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.3s;
    }
    .login-card .btn:hover { opacity: 0.9; }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }

    .dashboard { display: none; min-height: 100vh; }
    .dash-header {
      background: var(--bg2); border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
    }
    .dash-header h2 { font-size: 20px; font-weight: 600; }
    .dash-header h2 em { font-style: normal; color: var(--green-light); }
    .dash-header .user-info { display: flex; align-items: center; gap: 16px; }
    .dash-header .user-info span { font-size: 13px; color: var(--text-muted); }
    .dash-header .logout-btn {
      padding: 8px 20px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: var(--text-muted); cursor: pointer;
      font-size: 13px; transition: all 0.3s;
    }
    .dash-header .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .dash-body { padding: 32px; max-width: 1100px; margin: 0 auto; }

    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 28px;
      background: var(--bg2); border-radius: var(--radius);
      padding: 4px; border: 1px solid rgba(255,255,255,0.06);
    }
    .tab-btn {
      flex: 1; padding: 12px; border-radius: 8px; border: none;
      background: transparent; color: var(--text-muted); font-size: 14px;
      font-weight: 500; cursor: pointer; transition: all 0.3s;
    }
    .tab-btn.active { background: var(--green); color: #fff; }
    .tab-btn:hover:not(.active) { background: var(--surface); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-title {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .section-title h3 { font-size: 18px; font-weight: 600; }

    .btn-sm {
      padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: opacity 0.3s;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-green { background: var(--green-light); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--text); }

    .cat-card, .item-card {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .cat-card.dragging { opacity: 0.4; }
    .cat-card.drag-over { border-color: var(--green-light); box-shadow: 0 0 20px var(--green-glow, rgba(0,167,28,0.3)); }
    .cat-row, .item-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; gap: 12px;
    }
    .cat-info, .item-info { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .cat-thumb {
      width: 48px; height: 48px; border-radius: 8px; object-fit: cover;
      background: var(--surface); flex-shrink: 0;
    }
    .cat-info .cat-name { font-weight: 600; font-size: 15px; }
    .cat-info .cat-meta { font-size: 12px; color: var(--text-muted); }
    .drag-handle {
      cursor: grab; color: var(--text-muted); font-size: 18px; padding: 4px; user-select: none; flex-shrink: 0;
      display: flex; align-items: center;
    }
    .drag-handle:active { cursor: grabbing; }
    .item-info .item-name { font-weight: 500; font-size: 14px; }
    .item-info .item-cat { font-size: 12px; color: var(--text-muted); }
    .item-info .item-price { color: var(--green-light); font-weight: 600; font-size: 14px; margin-left: auto; }
    .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .cat-picker {
      display: flex; flex-direction: column; gap: 8px;
    }
    .cat-picker-btn {
      padding: 14px 20px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.06);
      background: var(--bg2); color: var(--text); font-size: 14px; font-weight: 500;
      cursor: pointer; text-align: left; transition: all 0.2s; font-family: inherit;
    }
    .cat-picker-btn:hover { background: var(--surface-hover); border-color: var(--green-light); }
    .cat-picker-btn.active { border-color: var(--green-light); background: rgba(0,167,28,0.1); }
    .sub-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .sub-header h3 { font-size: 18px; font-weight: 600; }
    .back-btn {
      background: none; border: none; color: var(--text-muted); font-size: 20px;
      cursor: pointer; padding: 4px; display: flex; align-items: center;
    }
    .back-btn:hover { color: var(--text); }

    .slide-card {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .slide-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; gap: 12px;
    }
    .slide-preview {
      width: 80px; height: 60px; border-radius: 6px; object-fit: cover;
      background: var(--surface); flex-shrink: 0;
    }
    .slide-info { flex: 1; font-size: 13px; color: var(--text-muted); min-width: 0; }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); padding: 32px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { font-size: 20px; margin-bottom: 20px; }
    .modal label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal input, .modal select {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: var(--surface);
      font-size: 14px; outline: none;
      transition: border-color 0.3s; margin-bottom: 16px;
    }
    .modal input, .modal select { color: var(--text); }
    .modal select option { color: #111; background: #fff; }
    .modal input:focus, .modal select:focus { border-color: var(--green-light); }
    .modal .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    .modal .btn-row .btn-sm { flex: 1; text-align: center; padding: 12px; }

    @media (max-width: 768px) {
      .dash-body { padding: 16px; }
      .dash-header { padding: 12px 16px; }
      .cat-row, .item-row { flex-wrap: wrap; }
      .cat-info, .item-info { flex-wrap: wrap; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1><em>FRUIT</em>BAR</h1>
      <p>Admin Dashboard</p>
      <label>Email</label>
      <input type="email" id="loginUser" placeholder="Enter email" autocomplete="off" />
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" />
      <button class="btn" onclick="login()">Sign In</button>
      <div class="login-error" id="loginError">Invalid credentials</div>
      <div style="margin-top:24px;text-align:center;font-size:13px;color:var(--text-muted)">
        <a href="#" onclick="openFirebaseSettings();return false" style="color:var(--green-light);text-decoration:none">Configure Firebase</a>
      </div>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
      <div class="dash-header">
        <h2><em>FRUIT</em>BAR &mdash; Admin</h2>
        <div class="user-info">
          <span id="syncStatus" style="font-size:12px;color:var(--text-muted);cursor:pointer" onclick="syncNow()" title="Click to sync now"></span>
          <span id="dashUser"></span>
          <a href="index.html" style="padding:8px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);color:#8A8680;text-decoration:none;font-size:13px;transition:all 0.3s" onmouseover="this.style.color='#00a31c'" onmouseout="this.style.color='#8A8680'">View Site</a>
          <button class="logout-btn" onclick="logout()" style="border-color:rgba(255,255,255,0.1)">Sign Out</button>
          <button class="logout-btn" onclick="openFirebaseSettings()" style="border-color:rgba(255,255,255,0.1)">Settings</button>
        </div>
      </div>
    <div class="dash-body">
      <div class="tab-bar">
        <button class="tab-btn active" id="tabCategories" onclick="switchTab('categories')">Categories</button>
        <button class="tab-btn" id="tabItems" onclick="switchTab('items')">Items</button>
        <button class="tab-btn" id="tabSlideshow" onclick="switchTab('slideshow')">Slideshow</button>
      </div>
      <div class="tab-content active" id="tabCategoriesContent">
        <div class="section-title">
          <h3>All Categories</h3>
          <button class="btn-sm btn-green" onclick="openAddCat()">+ Add Category</button>
        </div>
        <div id="categoriesList"></div>
      </div>
      <div class="tab-content" id="tabItemsContent">
        <div id="itemsList"></div>
      </div>
      <div class="tab-content" id="tabSlideshowContent">
        <div class="section-title">
          <h3>Slideshow Images</h3>
          <button class="btn-sm btn-green" onclick="openAddSlide()">+ Add Image</button>
        </div>
        <div id="slideshowList"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    const DATA_KEY = 'fruitbar_menu_data';
    const IMAGES_KEY = 'fruitbar_cat_images';
    const SLIDESHOW_KEY = 'fruitbar_slideshow';
    const ORDER_KEY = 'fruitbar_cat_order';

    var selectedCat = null;

    var syncStatusEl = null;
    var fbApp = null;
    var fbDb = null;

    function getFbConfig() {
      try { return JSON.parse(localStorage.getItem('fruitbar_fb_config')); }
      catch(e) { return null; }
    }

    function saveFbConfig(config) {
      localStorage.setItem('fruitbar_fb_config', JSON.stringify(config));
    }

    function setSyncStatus(text, ok) {
      if (!syncStatusEl) syncStatusEl = document.getElementById('syncStatus');
      if (!syncStatusEl) return;
      syncStatusEl.textContent = text;
      syncStatusEl.style.color = ok ? 'var(--green-light)' : 'var(--danger)';
    }

    function getFirebaseDb() {
      if (fbDb) return fbDb;
      var config = getFbConfig();
      if (!config) return null;
      try {
        if (!fbApp) {
          fbApp = firebase.initializeApp(config);
        }
        fbDb = firebase.firestore();
        return fbDb;
      } catch(e) {
        console.error('Firebase init error:', e);
        return null;
      }
    }

    async function syncToFirebase() {
      var config = getFbConfig();
      if (!config) {
        setSyncStatus('Firebase not configured', false);
        return;
      }
      setSyncStatus('Syncing...', true);

      try {
        var db = getFirebaseDb();
        if (!db) {
          setSyncStatus('Firebase init failed', false);
          return;
        }

        var menu = JSON.parse(localStorage.getItem(DATA_KEY));
        var slides = JSON.parse(localStorage.getItem(SLIDESHOW_KEY));
        var images = JSON.parse(localStorage.getItem(IMAGES_KEY));
        var order = getOrder();

        await db.collection('fruitbar').doc('data').set({
          menu: menu,
          slides: slides,
          images: images,
          order: order,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        setSyncStatus('Synced', true);
        setTimeout(function() { setSyncStatus('', true); }, 3000);
      } catch(e) {
        console.error('Firebase sync error:', e);
        setSyncStatus('Error: ' + e.message, false);
      }
    }

    function openFirebaseSettings() {
      var config = getFbConfig();
      var configJson = config ? JSON.stringify(config, null, 2) : '';
      document.getElementById('modalContent').innerHTML =
        '<h3>Firebase Sync Settings</h3>' +
        '<label>Firebase Config (JSON)</label>' +
        '<textarea id="fbConfigJson" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--text);font-size:13px;font-family:monospace;outline:none;margin-bottom:16px;resize:vertical;min-height:180px">' + configJson.replace(/</g, '&lt;') + '</textarea>' +
        '<div style="margin-bottom:16px;font-size:12px;color:var(--text-muted);text-align:left">' +
          'Paste your Firebase web app config from ' +
          '<strong>Project Settings &gt; General &gt; Your apps</strong>. ' +
          'Need a <a href="https://console.firebase.google.com/" target="_blank" style="color:var(--green-light)">Firebase project</a> ' +
          'with <strong>Firestore</strong> enabled and <strong>Email/Password Auth</strong> enabled in Authentication.<br><br>' +
    'After saving, log in with the admin email/password you created in Firebase Console.<br><br>' +
    '<strong style="color:#F0EDE8">⚠ Important:</strong> For visitors to see your data, your Firestore security rules must allow public read access. Go to your <a href="https://console.firebase.google.com/" target="_blank" style="color:var(--green-light)">Firebase Console</a> → Firestore → Rules and set:<br>' +
    '<code style="display:block;background:rgba(0,0,0,0.3);padding:8px 12px;border-radius:6px;margin-top:6px;white-space:pre;font-size:11px">rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /{document=**} {\n      allow read: if true;\n      allow write: if request.auth != null;\n    }\n  }\n}</code>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn-sm btn-green" onclick="saveFirebaseSettings()">Save</button>' +
          '<button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function saveFirebaseSettings() {
      var json = document.getElementById('fbConfigJson').value.trim();
      if (!json) return;
      try {
        var config = JSON.parse(json);
        if (!config.apiKey || !config.projectId) {
          setSyncStatus('Invalid config - need apiKey and projectId', false);
          return;
        }
        fbApp = null;
        fbDb = null;
        saveFbConfig(config);
        closeModal();
        syncToFirebase();
      } catch(e) {
        setSyncStatus('Invalid JSON: ' + e.message, false);
      }
    }

    function getOrder() {
      try { return JSON.parse(localStorage.getItem(ORDER_KEY)) || []; }
      catch(e) { return []; }
    }
    function saveOrder(arr) {
      localStorage.setItem(ORDER_KEY, JSON.stringify(arr));
    }
    function rebuildOrder() {
      var data = getMenu();
      var order = getOrder().filter(function(c) { return data[c] !== undefined; });
      var existing = {};
      order.forEach(function(c) { existing[c] = true; });
      Object.keys(data).forEach(function(c) {
        if (!existing[c]) order.push(c);
      });
      saveOrder(order);
      return order;
    }

    function syncNow() {
      syncToFirebase();
    }
    function clearSession() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginUser').value = '';
      document.getElementById('loginPass').value = '';
    }

    async function loadFromFirebase() {
      var db = getFirebaseDb();
      if (!db) return;
      try {
        var doc = await db.collection('fruitbar').doc('data').get();
        if (doc.exists) {
          var data = doc.data();
          if (data.menu && typeof data.menu === 'object' && Object.keys(data.menu).length) {
            localStorage.setItem(DATA_KEY, JSON.stringify(data.menu));
          }
          if (data.images && typeof data.images === 'object') {
            localStorage.setItem(IMAGES_KEY, JSON.stringify(data.images));
          }
          if (data.slides && Array.isArray(data.slides)) {
            localStorage.setItem(SLIDESHOW_KEY, JSON.stringify(data.slides));
          }
          if (data.order && Array.isArray(data.order)) {
            saveOrder(data.order);
          }
        }
      } catch(e) {
        console.error('Load from Firebase error:', e);
      }
    }

    function init() {
      var config = getFbConfig();
      if (config) {
        try {
          if (!fbApp) {
            fbApp = firebase.initializeApp(config);
            fbDb = firebase.firestore();
          }
          firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
              loadFromFirebase().then(function() {
                showDash(user.email);
              });
            }
          });
        } catch(e) {
          console.error('Firebase init error:', e);
        }
      }
    }

    function login() {
      const email = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      var config = getFbConfig();
      if (!config) {
        document.getElementById('loginError').textContent = 'Firebase not configured. Click "Configure Firebase" below.';
        document.getElementById('loginError').style.display = 'block';
        return;
      }
      try {
        if (!fbApp) {
          fbApp = firebase.initializeApp(config);
          fbDb = firebase.firestore();
        }
      } catch(e) {
        document.getElementById('loginError').textContent = 'Firebase init error: ' + e.message;
        document.getElementById('loginError').style.display = 'block';
        return;
      }
      firebase.auth().signInWithEmailAndPassword(email, pass).then(function(cred) {
        loadFromFirebase().then(function() {
          showDash(cred.user.email);
        });
      }).catch(function(error) {
        document.getElementById('loginError').textContent = error.message;
        document.getElementById('loginError').style.display = 'block';
      });
    }

    function logout() {
      firebase.auth().signOut().then(function() {
        clearSession();
      }).catch(function() {
        clearSession();
      });
    }

    function showDash(user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('dashUser').textContent = user;
      renderCategories();
      renderItems();
      renderSlideshow();
      var config = getFbConfig();
      if (config && config.apiKey) {
        setSyncStatus('Ready', true);
      } else {
        setSyncStatus('Setup Firebase', false);
      }
    }

    function getMenu() {
      return JSON.parse(localStorage.getItem(DATA_KEY)) || {};
    }
    function saveMenu(data) {
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
      renderCategories();
      renderItems();
      syncToFirebase();
    }
    function getImages() {
      return JSON.parse(localStorage.getItem(IMAGES_KEY)) || {};
    }
    function saveImages(data) {
      localStorage.setItem(IMAGES_KEY, JSON.stringify(data));
      renderCategories();
      syncToFirebase();
    }

    function getSlides() {
      return JSON.parse(localStorage.getItem(SLIDESHOW_KEY)) || [];
    }
    function saveSlides(data) {
      localStorage.setItem(SLIDESHOW_KEY, JSON.stringify(data));
      renderSlideshow();
      syncToFirebase();
    }

    function renderSlideshow() {
      const slides = getSlides();
      const container = document.getElementById('slideshowList');
      if (!slides.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">&#128247;</div><p>No slideshow images yet.</p></div>';
        return;
      }
      container.innerHTML = slides.map(function(slide, idx) {
        const label = slide.name || 'Image ' + (idx + 1);
        return '<div class="slide-card">' +
          '<div class="slide-row">' +
            '<img class="slide-preview" src="' + slide.src + '" alt="' + label + '" />' +
            '<div class="slide-info">' + label + '</div>' +
            '<div class="actions">' +
              '<button class="btn-sm btn-danger" onclick="removeSlide(' + idx + ')">Delete</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function openAddSlide() {
      document.getElementById('modalContent').innerHTML =
        '<h3>Add Slideshow Image</h3>' +
        '<label>Upload Image</label>' +
        '<input type="file" id="newSlideFile" accept="image/*" />' +
        '<div style="margin-bottom:16px;font-size:12px;color:var(--text-muted)">Images are stored in the browser. Maximum size recommended: 2MB per image.</div>' +
        '<label>Or paste image URL</label>' +
        '<input type="text" id="newSlideUrl" placeholder="https://example.com/image.jpg" />' +
        '<div class="btn-row">' +
          '<button class="btn-sm btn-green" onclick="addSlide()">Save</button>' +
          '<button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>' +
        '</div>';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function addSlide() {
      const fileInput = document.getElementById('newSlideFile');
      const urlInput = document.getElementById('newSlideUrl');
      const file = fileInput.files && fileInput.files[0];
      const url = urlInput.value.trim();

      if (!file && !url) return;

      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const slides = getSlides();
          slides.push({ src: e.target.result, name: file.name });
          saveSlides(slides);
          closeModal();
        };
        reader.readAsDataURL(file);
      } else {
        const slides = getSlides();
        slides.push({ src: url, name: url.split('/').pop() || 'Image ' + (slides.length + 1) });
        saveSlides(slides);
        closeModal();
      }
    }

    function removeSlide(idx) {
      if (!confirm('Remove this image from slideshow?')) return;
      const slides = getSlides();
      slides.splice(idx, 1);
      saveSlides(slides);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'categories') {
        document.getElementById('tabCategories').classList.add('active');
        document.getElementById('tabCategoriesContent').classList.add('active');
        renderCategories();
      } else if (tab === 'items') {
        document.getElementById('tabItems').classList.add('active');
        document.getElementById('tabItemsContent').classList.add('active');
        renderItems();
      } else {
        document.getElementById('tabSlideshow').classList.add('active');
        document.getElementById('tabSlideshowContent').classList.add('active');
        renderSlideshow();
      }
    }

    function renderCategories() {
      const data = getMenu();
      const images = getImages();
      const container = document.getElementById('categoriesList');
      const order = rebuildOrder();
      if (!order.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">&#128193;</div><p>No categories yet.</p></div>';
        return;
      }
      container.innerHTML = order.map(function(cat) {
        const img = images[cat] || '';
        return '<div class="cat-card" draggable="true" data-cat="' + cat.replace(/"/g, '&quot;') + '">' +
          '<div class="cat-row">' +
            '<div class="drag-handle" data-drag-handle>&#9776;</div>' +
            '<div class="cat-info">' +
              (img ? '<img class="cat-thumb" src="' + img + '" alt="" onerror="this.style.display=\'none\'" />' : '<div class="cat-thumb"></div>') +
              '<div>' +
                '<div class="cat-name">' + cat + '</div>' +
                '<div class="cat-meta">' + data[cat].length + ' item' + (data[cat].length !== 1 ? 's' : '') + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="actions">' +
              '<button class="btn-sm btn-outline" onclick="openEditCat(\'' + cat.replace(/'/g, "\\'") + '\')">Edit</button>' +
              '<button class="btn-sm btn-danger" onclick="removeCat(\'' + cat.replace(/'/g, "\\'") + '\')">Delete</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      setupDrag();
    }

    function setupDrag() {
      var cards = container.querySelectorAll('.cat-card[draggable]');
      cards.forEach(function(card) {
        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragend', onDragEnd);
        card.addEventListener('dragover', onDragOver);
        card.addEventListener('dragleave', onDragLeave);
        card.addEventListener('drop', onDrop);
      });
    }
    function onDragStart(e) {
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.cat);
    }
    function onDragEnd(e) {
      this.classList.remove('dragging');
      document.querySelectorAll('.cat-card').forEach(function(c) { c.classList.remove('drag-over'); });
    }
    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      var card = e.target.closest('.cat-card');
      if (card && card !== this) this.classList.add('drag-over');
    }
    function onDragLeave(e) {
      this.classList.remove('drag-over');
    }
    function onDrop(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      var fromCat = e.dataTransfer.getData('text/plain');
      var toCat = this.dataset.cat;
      if (!fromCat || fromCat === toCat) return;
      var order = getOrder();
      var fromIdx = order.indexOf(fromCat);
      var toIdx = order.indexOf(toCat);
      if (fromIdx === -1 || toIdx === -1) return;
      order.splice(fromIdx, 1);
      toIdx = order.indexOf(toCat);
      order.splice(toIdx, 0, fromCat);
      saveOrder(order);
      renderCategories();
    }
    var container = document.getElementById('categoriesList');

    function renderItems(cat) {
      const data = getMenu();
      const container = document.getElementById('itemsList');
      const order = rebuildOrder();
      if (!order.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">&#127869;</div><p>No items yet.</p></div>';
        return;
      }
      if (cat) {
        var items = data[cat] || [];
        container.innerHTML =
          '<div class="sub-header">' +
            '<button class="back-btn" onclick="renderItems()">&#8592;</button>' +
            '<h3>' + cat + '</h3>' +
            '<button class="btn-sm btn-green" onclick="openAddItem(\'' + cat.replace(/'/g, "\\'") + '\')" style="margin-left:auto">+ Add Item</button>' +
          '</div>' +
          items.map(function(item, idx) {
            return '<div class="item-card">' +
              '<div class="item-row">' +
                '<div class="item-info">' +
                  '<div>' +
                    '<div class="item-name">' + item.name + '</div>' +
                    (item.desc ? '<div class="item-cat">' + item.desc + '</div>' : '') +
                  '</div>' +
                  '<span class="item-price">$' + item.price + '</span>' +
                '</div>' +
                '<div class="actions">' +
                  '<button class="btn-sm btn-outline" onclick="openEditItem(\'' + cat.replace(/'/g, "\\'") + '\',' + idx + ')">Edit</button>' +
                  '<button class="btn-sm btn-danger" onclick="removeItem(\'' + cat.replace(/'/g, "\\'") + '\',' + idx + ')">Delete</button>' +
                '</div>' +
              '</div>' +
            '</div>';
          }).join('');
      } else {
        selectedCat = null;
        container.innerHTML =
          '<div class="section-title" style="margin-bottom:20px">' +
            '<h3>Select a Category</h3>' +
          '</div>' +
          '<div class="cat-picker">' +
          order.map(function(c) {
            return '<button class="cat-picker-btn" onclick="renderItems(\'' + c.replace(/'/g, "\\'") + '\')">' +
              c + ' <span style="color:var(--text-muted);font-size:13px;font-weight:400">(' + (data[c] ? data[c].length : 0) + ' items)</span>' +
            '</button>';
          }).join('') +
          '</div>';
      }
    }

    function removeCat(cat) {
      if (!confirm('Delete "' + cat + '" and all its items?')) return;
      const data = getMenu();
      const images = getImages();
      delete data[cat];
      delete images[cat];
      var order = getOrder();
      var idx = order.indexOf(cat);
      if (idx > -1) order.splice(idx, 1);
      saveOrder(order);
      saveMenu(data);
      saveImages(images);
    }

    function removeItem(cat, idx) {
      if (!confirm('Delete this item?')) return;
      const data = getMenu();
      data[cat].splice(idx, 1);
      if (!data[cat].length) delete data[cat];
      saveMenu(data);
    }

    function openAddCat() {
      const overlay = document.getElementById('modalOverlay');
      document.getElementById('modalContent').innerHTML = `
        <h3>Add Category</h3>
        <label>Category Name</label>
        <input type="text" id="newCatName" placeholder="e.g. Champagne" />
        <label>Background Image URL (optional)</label>
        <input type="text" id="newCatImg" placeholder="e.g. images/champagne.jpg" />
        <div style="margin-bottom:16px;font-size:12px;color:var(--text-muted)">Leave empty to use a default dark card.</div>
        <div class="btn-row">
          <button class="btn-sm btn-green" onclick="addCat()">Save</button>
          <button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>
        </div>
      `;
      overlay.classList.add('open');
      setTimeout(() => document.getElementById('newCatName').focus(), 100);
    }

    function addCat() {
      const name = document.getElementById('newCatName').value.trim();
      const img = document.getElementById('newCatImg').value.trim();
      if (!name) return;
      const data = getMenu();
      const images = getImages();
      if (data[name]) { alert('Category already exists'); return; }
      data[name] = [];
      if (img) images[name] = img;
      var order = getOrder();
      order.push(name);
      saveOrder(order);
      saveMenu(data);
      saveImages(images);
      closeModal();
    }

    function openEditCat(cat) {
      const images = getImages();
      const currentImg = images[cat] || '';
      const overlay = document.getElementById('modalOverlay');
      document.getElementById('modalContent').innerHTML = `
        <h3>Edit Category</h3>
        <label>Category Name</label>
        <input type="text" id="editCatName" value="${cat.replace(/"/g, '&quot;')}" />
        <label>Background Image URL</label>
        <input type="text" id="editCatImg" value="${currentImg.replace(/"/g, '&quot;')}" placeholder="e.g. images/champagne.jpg" />
        <div style="margin-bottom:16px;font-size:12px;color:var(--text-muted)">Leave empty for a default dark card.</div>
        <div class="btn-row">
          <button class="btn-sm btn-green" onclick="saveEditCat('${cat.replace(/'/g, "\\'")}')">Save</button>
          <button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>
        </div>
      `;
      overlay.classList.add('open');
    }

    function saveEditCat(oldName) {
      const newName = document.getElementById('editCatName').value.trim();
      const img = document.getElementById('editCatImg').value.trim();
      if (!newName) return;
      const data = getMenu();
      const images = getImages();
      if (newName !== oldName) {
        if (data[newName]) { alert('Category "' + newName + '" already exists'); return; }
        data[newName] = data[oldName];
        if (images[oldName]) images[newName] = images[oldName];
        delete data[oldName];
        delete images[oldName];
        var order = getOrder();
        var idx = order.indexOf(oldName);
        if (idx > -1) order[idx] = newName;
        saveOrder(order);
      }
      if (img) images[newName] = img;
      else delete images[newName];
      saveMenu(data);
      saveImages(images);
      closeModal();
    }

    function openAddItem(preSelectedCat) {
      const data = getMenu();
      const cats = Object.keys(data);
      const overlay = document.getElementById('modalOverlay');
      const catOptions = cats.map(c => `<option value="${c.replace(/"/g, '&quot;')}"${preSelectedCat && c === preSelectedCat ? ' selected' : ''}>${c}</option>`).join('');
      var catField = preSelectedCat
        ? '<input type="hidden" id="newItemCat" value="' + preSelectedCat.replace(/"/g, '&quot;') + '" /><div style="margin-bottom:16px;padding:10px 14px;border-radius:8px;background:var(--surface);color:var(--text-muted);font-size:14px"><strong style="color:var(--text)">Category:</strong> ' + preSelectedCat + '</div>'
        : '<label>Category</label><select id="newItemCat">' + catOptions + '</select>';
      document.getElementById('modalContent').innerHTML = `
        <h3>Add Item</h3>
        ${catField}
        <label>Item Name</label>
        <input type="text" id="newItemName" placeholder="e.g. Mojito" />
        <label>Price (USD)</label>
        <input type="number" id="newItemPrice" placeholder="10" min="0" step="0.5" />
        <label>Description (optional)</label>
        <input type="text" id="newItemDesc" placeholder="e.g. By the glass" />
        <div class="btn-row">
          <button class="btn-sm btn-green" onclick="addItem()">Save</button>
          <button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>
        </div>
      `;
      overlay.classList.add('open');
      setTimeout(() => document.getElementById('newItemName').focus(), 100);
    }

    function addItem() {
      const cat = document.getElementById('newItemCat').value;
      const name = document.getElementById('newItemName').value.trim();
      const price = parseFloat(document.getElementById('newItemPrice').value);
      const desc = document.getElementById('newItemDesc').value.trim();
      if (!name || isNaN(price) || !cat) return;
      const data = getMenu();
      const item = { name, price };
      if (desc) item.desc = desc;
      data[cat].push(item);
      saveMenu(data);
      closeModal();
    }

    function openEditItem(cat, idx) {
      const data = getMenu();
      const item = data[cat][idx];
      const cats = Object.keys(data);
      const catOptions = cats.map(c => `<option value="${c.replace(/"/g, '&quot;')}"${c === cat ? ' selected' : ''}>${c}</option>`).join('');
      const overlay = document.getElementById('modalOverlay');
      document.getElementById('modalContent').innerHTML = `
        <h3>Edit Item</h3>
        <label>Category</label>
        <select id="editItemCat">${catOptions}</select>
        <label>Item Name</label>
        <input type="text" id="editItemName" value="${item.name.replace(/"/g, '&quot;')}" />
        <label>Price (USD)</label>
        <input type="number" id="editItemPrice" value="${item.price}" min="0" step="0.5" />
        <label>Description (optional)</label>
        <input type="text" id="editItemDesc" value="${(item.desc || '').replace(/"/g, '&quot;')}" />
        <div class="btn-row">
          <button class="btn-sm btn-green" onclick="saveEditItem('${cat.replace(/'/g, "\\'")}', ${idx})">Save</button>
          <button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>
        </div>
      `;
      overlay.classList.add('open');
    }

    function saveEditItem(oldCat, idx) {
      const newCat = document.getElementById('editItemCat').value;
      const name = document.getElementById('editItemName').value.trim();
      const price = parseFloat(document.getElementById('editItemPrice').value);
      const desc = document.getElementById('editItemDesc').value.trim();
      if (!name || isNaN(price) || !newCat) return;
      const data = getMenu();
      if (newCat === oldCat) {
        data[oldCat][idx] = { name, price };
        if (desc) data[oldCat][idx].desc = desc;
      } else {
        data[oldCat].splice(idx, 1);
        if (!data[oldCat].length) delete data[oldCat];
        const item = { name, price };
        if (desc) item.desc = desc;
        data[newCat].push(item);
      }
      saveMenu(data);
      closeModal();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (document.getElementById('loginScreen').style.display !== 'none') login();
      }
      if (e.key === 'Escape') closeModal();
    });

    init();
  </script>
</body>
</html>
